name: Update AI models

on:
  schedule:
    # Daily at 02:00 UTC (10:00 Beijing time)
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Refresh model data
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          # Override to point at a different OpenAI-compatible provider:
          # LLM_BASE_URL: https://api.deepseek.com/v1
          # LLM_MODEL: deepseek-chat
        run: python scripts/update_models.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/models.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: refresh model data $(date -u +%F)"
            git push
          fi
